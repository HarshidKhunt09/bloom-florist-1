        - generic [ref=e30]:
          - heading "Get Back to Your Best – Book Your Physiotherapy Appointment Today" [level=2] [ref=e31]
          - generic [ref=e32]: "# Get in Touch with Pinnacle Physiotherapy Whether you're recovering from a sports injury, managing chronic back pain, or need post-surgical rehabilitation, our experienced team in Perth's CBD is ready to help you achieve fast, lasting results. ## Visit Our Perth CBD Clinic **Pinnacle Physiotherapy** Suite 12, 145 St Georges Terrace Perth WA 6000 Conveniently located in the heart of Perth's CBD with easy access to public transport and nearby parking facilities. ## Contact Details **Phone:** (08) 9123 4567 **Email:** info@pinnacle-physio.com.au **Fax:** (08) 9123 4568 ## Clinic Opening Hours - **Monday to Friday:** 7:00am – 7:00pm - **Saturday:** 8:00am – 2:00pm - **Sunday:** Closed Extended hours available to fit around your busy schedule. ## Book Your Appointment Online Skip the phone queue and book your appointment 24/7 through HotDoc. Simply select your preferred physiotherapist, choose a time that suits you, and receive instant confirmation. It's that easy! [Book via HotDoc →](#) ## Bulk Billing Available We offer bulk billing options for eligible patients with valid referrals and chronic disease management plans. Check with our reception team to see if you qualify. ## Our Services Not sure which treatment is right for you? Our physiotherapists specialise in: - **Sports injury rehabilitation** – Get back in the game faster - **Back and neck pain management** – Evidence-based relief - **Post-surgical rehabilitation** – Structured recovery programs - **Dry needling** – Target trigger points effectively - **Sports massage** – Enhanced recovery and performance - **Hydrotherapy** – Low-impact aquatic therapy - **Clinical Pilates** – Strengthen your core and prevent injury - **NDIS-registered care** – Fully accredited disability support ## Frequently Asked Questions **Do I need a referral?** No referral is necessary to see a physiotherapist. However, if you have private health insurance or are claiming under a chronic disease management plan, a GP referral may be required. **What should I bring to my first appointment?** Please bring any relevant medical reports, scans, or imaging results, along with your Medicare card and private health insurance details if applicable. **Do you have parking?** Yes, there's secure underground parking in our building, plus several public car parks within walking distance. **Are your facilities accessible?** Absolutely. Our clinic is fully wheelchair accessible with lift access and accessible treatment rooms. ## NDIS Participants Welcome Pinnacle Physiotherapy is a registered NDIS provider. We work closely with participants, support coordinators, and carers to deliver tailored physiotherapy services that help you achieve your goals. Contact us to discuss how we can support your NDIS plan. ## Ready to Start Your Recovery? Don't let pain hold you back any longer. Our caring team is committed to delivering evidence-based treatments that get real results. Contact Pinnacle Physiotherapy today and take the first step towards a stronger, healthier you."
